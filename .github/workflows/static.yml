<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PresupuestoApp — Control de artículos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      color: #2d3748;
      font-size: 32px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header p {
      color: #718096;
      font-size: 14px;
    }
    
    .btn-config {
      background: transparent;
      border: 2px solid #e2e8f0;
      color: #718096;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .btn-config:hover {
      border-color: #667eea;
      color: #667eea;
    }
    
    .config-section {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: none;
    }
    
    .config-section.active {
      display: block;
    }
    
    .config-section h3 {
      color: #2d3748;
      margin-bottom: 15px;
      font-size: 18px;
    }
    
    .config-section input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      background: #f7fafc;
    }
    
    .form-section {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .form-section h3 {
      color: #2d3748;
      margin-bottom: 20px;
      font-size: 20px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 15px;
      align-items: end;
    }
    
    .form-grid-bolsa {
      display: grid;
      grid-template-columns: repeat(4, 1fr) auto;
      gap: 15px;
      align-items: end;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px dashed #e2e8f0;
    }
    
    .form-grid-bolsa .section-label {
      grid-column: 1 / -1;
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #4a5568;
      font-size: 14px;
    }
    
    .form-group input {
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-group input[readonly] {
      background: #f7fafc;
      color: #718096;
    }
    
    .form-group small {
      color: #a0aec0;
      font-size: 11px;
      margin-top: 4px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      font-size: 14px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(253, 160, 133, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(253, 160, 133, 0.4);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(168, 224, 99, 0.3);
    }
    
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(168, 224, 99, 0.4);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(238, 9, 121, 0.3);
    }
    
    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(238, 9, 121, 0.4);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .stat-card h4 {
      color: #718096;
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .stat-card .value {
      font-size: 36px;
      font-weight: bold;
      color: #2d3748;
    }
    
    .stat-card .value.highlight {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .table-section {
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .table-header h3 {
      color: #2d3748;
      font-size: 20px;
    }
    
    .badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    
    thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    
    th {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.5px;
    }
    
    tbody tr:hover {
      background: #f7fafc;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
    }
    
    .empty-state td {
      color: #718096;
      font-size: 16px;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .delete-btn {
      background: #fc8181;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .delete-btn:hover {
      background: #f56565;
      transform: scale(1.05);
    }
    
    .tipo-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .tipo-pieza {
      background: #c6f6d5;
      color: #22543d;
    }
    
    .tipo-bolsa {
      background: #feebc8;
      color: #c05621;
    }
    
    @media (max-width: 968px) {
      .form-grid,
      .form-grid-bolsa {
        grid-template-columns: 1fr;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .actions {
        flex-direction: column;
      }
      
      .actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div>
        <h1>📊 PresupuestoApp</h1>
        <p>Control de artículos y precios unitarios</p>
      </div>
      <button class="btn-config" onclick="toggleConfig()">⚙️ Configurar Sheets</button>
    </div>

    <!-- Configuración (Oculto por defecto) -->
    <div class="config-section" id="configSection">
      <h3>URL del Apps Script (Web App de Google)</h3>
      <input type="text" id="appsScriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
      <small style="color: #666; display: block; margin-top: 5px;">Despliega tu Apps Script como Web App y pega aquí la URL generada.</small>
    </div>

    <!-- Formulario -->
    <div class="form-section">
      <h3>Agregar artículo</h3>
      
      <!-- Datos principales -->
      <div class="form-grid">
        <div class="form-group">
          <label>Artículo / Descripción</label>
          <input type="text" id="articuloNombre" placeholder="Ej. Tornillos M6 x 20mm">
        </div>
        <div class="form-group">
          <label>Código / Copro</label>
          <input type="text" id="articuloCopro" placeholder="Código del producto">
        </div>
        <div class="form-group">
          <label>Costo total ($)</label>
          <input type="number" id="articuloCosto" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Piezas / Cantidad</label>
          <input type="number" id="articuloPiezas" placeholder="1" min="1" value="1">
        </div>
        <div class="form-group">
          <label>Precio unitario</label>
          <input type="text" id="articuloPrecioUnitario" placeholder="—" readonly>
          <small>por pieza</small>
        </div>
      </div>

      <!-- Sección Bolsa/Paquete -->
      <div class="form-grid-bolsa">
        <div class="section-label">📦 Información de Bolsa/Paquete (Opcional)</div>
        <div class="form-group">
          <label>Piezas por bolsa</label>
          <input type="number" id="piezasPorBolsa" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>Costo por bolsa ($)</label>
          <input type="number" id="costoPorBolsa" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Costo por pieza (bolsa)</label>
          <input type="text" id="costoPorPiezaBolsa" placeholder="—" readonly>
          <small>calculado automáticamente</small>
        </div>
        <button class="btn btn-primary" onclick="agregarArticulo()">+ Agregar artículo</button>
      </div>
    </div>

    <!-- Estadísticas -->
    <div class="stats-grid">
      <div class="stat-card">
        <h4>Total artículos</h4>
        <div class="value" id="totalArticulos">0</div>
      </div>
      <div class="stat-card">
        <h4>Total piezas</h4>
        <div class="value" id="totalPiezas">0</div>
      </div>
      <div class="stat-card">
        <h4>Total bolsas</h4>
        <div class="value" id="totalBolsas">0</div>
      </div>
      <div class="stat-card">
        <h4>Inversión total</h4>
        <div class="value highlight" id="inversionTotal">$0.00</div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-section">
      <div class="table-header">
        <h3>Artículos capturados</h3>
        <span class="badge" id="contadorArticulos">0 artículos</span>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Artículo</th>
            <th>Costo total</th>
            <th>Piezas</th>
            <th>Precio unitario</th>
            <th>Piezas/bolsa</th>
            <th>Costo/pieza (bolsa)</th>
            <th>Tipo</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaArticulos">
          <tr class="empty-state">
            <td colspan="9">Agrega tu primer artículo para comenzar</td>
          </tr>
        </tbody>
      </table>

      <div class="actions">
        <button class="btn btn-success" onclick="sincronizarConSheets()">📤 Sincronizar con Google Sheets</button>
        <button class="btn btn-danger" onclick="limpiarTodo()">🗑️ Limpiar todo</button>
      </div>
    </div>
  </div>

  <script>
    // URL FIJA DEL APPS SCRIPT - No necesitas cambiarla
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwW6JqaaOQfUjyOgaQMAVydCRQPFztaXFGrchNvr2LjZXGiLal8bXE5xnQ1mG_pPg/exec';
    
    let articulos = [];

    // Mostrar/ocultar configuración
    function toggleConfig() {
      const configSection = document.getElementById('configSection');
      configSection.classList.toggle('active');
    }

    // Calcular precios automáticamente
    document.getElementById('articuloCosto').addEventListener('input', calcularPrecios);
    document.getElementById('articuloPiezas').addEventListener('input', calcularPrecios);
    document.getElementById('piezasPorBolsa').addEventListener('input', calcularPrecios);
    document.getElementById('costoPorBolsa').addEventListener('input', calcularPrecios);

    function calcularPrecios() {
      // Precio unitario normal
      const costo = parseFloat(document.getElementById('articuloCosto').value) || 0;
      const piezas = parseInt(document.getElementById('articuloPiezas').value) || 1;
      const precioUnitario = piezas > 0 ? (costo / piezas).toFixed(4) : 0;
      document.getElementById('articuloPrecioUnitario').value = precioUnitario > 0 ? '$' + precioUnitario : '—';
      
      // Costo por pieza desde bolsa
      const piezasPorBolsa = parseInt(document.getElementById('piezasPorBolsa').value) || 0;
      const costoPorBolsa = parseFloat(document.getElementById('costoPorBolsa').value) || 0;
      const costoPorPiezaBolsa = piezasPorBolsa > 0 ? (costoPorBolsa / piezasPorBolsa).toFixed(4) : 0;
      document.getElementById('costoPorPiezaBolsa').value = costoPorPiezaBolsa > 0 ? '$' + costoPorPiezaBolsa : '—';
    }

    function agregarArticulo() {
      const nombre = document.getElementById('articuloNombre').value.trim();
      const copro = document.getElementById('articuloCopro').value.trim();
      const costo = parseFloat(document.getElementById('articuloCosto').value) || 0;
      const piezas = parseInt(document.getElementById('articuloPiezas').value) || 1;
      const precioUnitario = piezas > 0 ? (costo / piezas).toFixed(4) : 0;
      const piezasPorBolsa = parseInt(document.getElementById('piezasPorBolsa').value) || 0;
      const costoPorBolsa = parseFloat(document.getElementById('costoPorBolsa').value) || 0;
      const costoPorPiezaBolsa = piezasPorBolsa > 0 ? (costoPorBolsa / piezasPorBolsa).toFixed(4) : 0;

      if (!nombre) {
        alert('⚠️ Por favor ingresa el nombre del artículo');
        document.getElementById('articuloNombre').focus();
        return;
      }

      articulos.push({
        nombre: nombre,
        copro: copro || 'N/A',
        costoTotal: costo,
        piezas: piezas,
        precioUnitario: parseFloat(precioUnitario),
        piezasPorBolsa: piezasPorBolsa,
        costoPorBolsa: costoPorBolsa,
        costoPorPiezaBolsa: parseFloat(costoPorPiezaBolsa) || 0
      });

      // Limpiar formulario
      document.getElementById('articuloNombre').value = '';
      document.getElementById('articuloCopro').value = '';
      document.getElementById('articuloCosto').value = '';
      document.getElementById('articuloPiezas').value = '1';
      document.getElementById('articuloPrecioUnitario').value = '';
      document.getElementById('piezasPorBolsa').value = '';
      document.getElementById('costoPorBolsa').value = '';
      document.getElementById('costoPorPiezaBolsa').value = '';

      actualizarTabla();
      actualizarTotales();
      
      document.getElementById('articuloNombre').focus();
    }

    function actualizarTabla() {
      const tbody = document.getElementById('tablaArticulos');
      
      if (articulos.length === 0) {
        tbody.innerHTML = `
          <tr class="empty-state">
            <td colspan="9">Agrega tu primer artículo para comenzar</td>
          </tr>
        `;
        document.getElementById('contadorArticulos').textContent = '0 artículos';
        return;
      }

      tbody.innerHTML = articulos.map((art, index) => {
        const tieneBolsa = art.piezasPorBolsa > 0;
        return `
          <tr>
            <td><strong>${art.copro}</strong></td>
            <td>${art.nombre}</td>
            <td>$${art.costoTotal.toFixed(2)}</td>
            <td>${art.piezas}</td>
            <td>$${art.precioUnitario.toFixed(4)}</td>
            <td>${tieneBolsa ? art.piezasPorBolsa : '—'}</td>
            <td>${tieneBolsa ? '$' + art.costoPorPiezaBolsa.toFixed(4) : '—'}</td>
            <td>
              ${tieneBolsa 
                ? '<span class="tipo-badge tipo-bolsa">Bolsa</span>' 
                : '<span class="tipo-badge tipo-pieza">Pieza</span>'
              }
            </td>
            <td><button class="delete-btn" onclick="eliminarArticulo(${index})">✕ Eliminar</button></td>
          </tr>
        `;
      }).join('');

      document.getElementById('contadorArticulos').textContent = `${articulos.length} artículo${articulos.length !== 1 ? 's' : ''}`;
    }

    function eliminarArticulo(index) {
      if (confirm('¿Eliminar este artículo?')) {
        articulos.splice(index, 1);
        actualizarTabla();
        actualizarTotales();
      }
    }

    function actualizarTotales() {
      const totalArticulos = articulos.length;
      const totalPiezas = articulos.reduce((sum, art) => sum + art.piezas, 0);
      const totalBolsas = articulos.filter(art => art.piezasPorBolsa > 0).length;
      const inversionTotal = articulos.reduce((sum, art) => sum + art.costoTotal, 0);

      document.getElementById('totalArticulos').textContent = totalArticulos;
      document.getElementById('totalPiezas').textContent = totalPiezas;
      document.getElementById('totalBolsas').textContent = totalBolsas;
      document.getElementById('inversionTotal').textContent = '$' + inversionTotal.toFixed(2);
    }

function sincronizarConSheets() {
  const scriptURL = document.getElementById('appsScriptUrl').value.trim();
  
  if (!scriptURL) {
    alert('⚠️ Por favor configura la URL del Apps Script primero');
    return;
  }

  if (articulos.length === 0) {
    alert('⚠️ No hay artículos para sincronizar');
    return;
  }

  const datos = {
    articulos: articulos,
    fecha: new Date().toLocaleDateString('es-ES')
  };

  const btnSincronizar = document.querySelector('button[onclick="sincronizarConSheets()"]');
  const textoOriginal = btnSincronizar.textContent;
  btnSincronizar.textContent = '⏳ Sincronizando...';
  btnSincronizar.disabled = true;

  fetch(scriptURL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify(datos)
  })
  .then(response => {
    // Con no-cors, la respuesta es "opaque" pero si llega aquí, se envió
    console.log('Respuesta recibida:', response.type);
    return Promise.resolve('enviado');
  })
  .then(() => {
    // Esperar un momento para asegurar que Google Sheets procesó los datos
    setTimeout(() => {
      alert('✅ Datos sincronizados correctamente con Google Sheets');
      limpiarTodo();
    }, 1000);
  })
  .catch(error => {
    console.error('Error completo:', error);
    alert('❌ Error al sincronizar: ' + error.message);
  })
  .finally(() => {
    btnSincronizar.textContent = textoOriginal;
    btnSincronizar.disabled = false;
  });
}    

    function limpiarTodo() {
      if (articulos.length === 0) return;
      
      if (confirm('¿Estás seguro de que deseas limpiar todos los artículos?')) {
        articulos = [];
        actualizarTabla();
        actualizarTotales();
      }
    }

    // Permitir agregar con Enter
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            agregarArticulo();
          }
        });
      });
    });
  </script>
</body>
</html>
